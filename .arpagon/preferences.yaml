# Preferencias de arpagon para visual-explainer
# El agente lee este archivo y aplica cada preferencia sobre SKILL.md
# después de sincronizar con upstream. Son intenciones, no parches exactos.

# ─── Entorno ────────────────────────────────────────────────────────────
# Estas variables deben existir para que el sharing via GCS funcione.
# El agente NO las configura — solo las usa.
env:
  VE_GCS_BUCKET: "agents-arpagon-01-med-arpagon-local"
  VE_GCS_PREFIX: "diagrams"
  VE_GCS_SA_KEY: "~/.config/gcloud/ve-sa.json"

preferences:
  - name: opt-in-only
    intent: >
      Quitar TODO comportamiento proactivo/automático del skill.
      El skill solo debe activarse cuando el usuario pida explícitamente
      un diagrama visual, página HTML o explicación visual.
      Quitar o reescribir cualquier texto que diga "always", "never fall back",
      "proactively", "don't wait for the user to ask", "visual is always default"
      o directivas agresivas similares.
      Las tablas, ensayos y otro contenido NO deben convertirse en HTML automáticamente.
      El usuario decide cuándo usar este skill.

  - name: agent-browser
    intent: >
      Reemplazar todas las referencias a surf-cli (herramienta de generación
      de imágenes con IA de Gemini) por agent-browser (herramienta de screenshots).
      surf-cli genera arte con IA. No usamos eso.
      En su lugar, agent-browser captura screenshots de páginas web reales, UIs
      y aplicaciones en ejecución via `agent-browser open <url>` y
      `agent-browser screenshot <path>`.
      Actualizar la línea de compatibilidad, la sección de ilustraciones,
      la sección de slide deck mode, y cualquier otro lugar donde se mencione
      surf-cli. Mantener el flujo de embeber en base64 pero adaptado a
      los comandos de agent-browser.

  - name: gcs-upload
    intent: >
      Reemplazar el sharing via Vercel deploy con upload a Google Cloud Storage.
      El script de upload está en scripts/upload.py (copiado desde .arpagon/files/).
      Uso: `uv run {{skill_dir}}/scripts/upload.py <html-file>`
      Genera un nombre de archivo basado en UUIDv7 y sube a GCS.
      Configuración via variables de entorno:
        VE_GCS_BUCKET (requerido), VE_GCS_PREFIX (default: diagrams),
        VE_GCS_SA_KEY (default: scripts/gcs-sa.json).
      Quitar todas las referencias a Vercel, vercel-deploy skill, y share.sh.
      El archivo commands/share.md también se reemplaza (desde .arpagon/files/).
